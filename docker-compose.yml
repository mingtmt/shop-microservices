version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: shop_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db
    networks:
      - shop_network

  redis:
    image: redis:7-alpine
    container_name: shop_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - shop_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shop_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - shop_network

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:

networks:
  shop_network:
    driver: bridge